name: Generate Event Pages

on:
  push:
    branches: [main]
    paths:
      - 'data/events.json'
      - 'templates/event-template.html'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate event pages
        run: node scripts/generate-events.js

      - name: Commit and push generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --staged --quiet || git commit -m "Auto-generate event pages [skip ci]"
          git push

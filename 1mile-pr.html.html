<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>1 Mile PR | STRR</title>
    <meta name="description" content="August 2026">
    <link rel="canonical" href="https://runstw.com/1mile-pr.html.html">
    <link rel="icon" href="/favicon.ico" sizes="48x48">
    <link rel="icon" type="image/png" sizes="96x96" href="/favicon-96.png">
    <link rel="icon" type="image/png" sizes="192x192" href="/favicon-192.png">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://runstw.com/1mile-pr.html.html">
    <meta property="og:title" content="1 Mile PR | STRR">
    <meta property="og:description" content="August 2026">
    <meta property="og:image" content="https://runstw.com/assets/1710779291890-850-218.jpeg">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; scroll-padding-top: 90px; }
        body { font-family: 'Montserrat', sans-serif; color: #333; background-color: #fcfcfc; line-height: 1.6; overflow-x: hidden; }
        a { text-decoration: none; color: inherit; }

        /* --- HEADER NAVIGATION --- */
        header { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; background-color: #fff; position: fixed; width: 100%; top: 0; z-index: 1000; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .logo-img { height: 50px; width: auto; display: block; }
        .logo-link { display: flex; align-items: center; z-index: 1001; position: relative; }
        .menu-toggle { display: none; order: 3; font-size: 1.8rem; cursor: pointer; z-index: 1001; position: relative; color: #333; }
        nav ul { list-style: none; display: flex; gap: 30px; align-items: center; }
        nav ul li a { font-weight: 700; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px; padding: 10px 0; display: block; }
        .dropdown { position: relative; }
        .dropdown-menu { display: none; position: absolute; top: 100%; left: 0; background-color: #fff; min-width: 250px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); padding: 10px 0; border-radius: 0 0 5px 5px; z-index: 1000; }
        .dropdown:hover .dropdown-menu { display: flex; flex-direction: column; gap: 0; }
        .dropdown-menu li { padding: 0; }
        .dropdown-menu li a { display: block; padding: 12px 20px; font-size: 0.85rem; font-weight: 700; text-transform: none; }
        .dropdown-menu li a:hover { background-color: #f5f5f5; }

        /* --- TOP BANNER (photo) --- */
        .banner { height: 55vh; background-color: #333; background-size: cover; background-position: center; display: flex; justify-content: center; align-items: center; text-align: center; color: #fff; padding-top: 80px; }
        .banner h1 { font-size: 3rem; font-weight: 900; text-transform: uppercase; letter-spacing: 2px; padding: 0 20px; text-shadow: 0 2px 10px rgba(0,0,0,0.5); }

        /* --- ACTION BAR (solid color, register button) --- */
        .action-bar { background-color: #e65100; padding: 30px 20px; display: flex; justify-content: center; align-items: center; }
        .action-bar .btn { display: inline-block; padding: 16px 45px; background-color: #fff; font-weight: 900; font-size: 1.2rem; text-transform: uppercase; letter-spacing: 1px; border-radius: 4px; transition: transform 0.2s; }
        .action-bar .btn:hover { transform: scale(1.05); }

        /* --- EVENT INFO --- */
        .event-info { max-width: 800px; margin: 0 auto; padding: 60px 20px; }
        .event-info h2 { font-size: 2rem; font-weight: 900; text-transform: uppercase; margin-bottom: 20px; }
        .event-info-body { font-size: 1.1rem; }
        .event-info-body p { margin-bottom: 15px; }

        /* --- ACCORDIONS --- */
        .details-section { max-width: 800px; margin: 0 auto; padding: 0 20px 60px 20px; }
        .details-section h2 { font-size: 2rem; font-weight: 900; text-transform: uppercase; margin-bottom: 20px; }
        details { background: #f9f9f9; padding: 15px; margin-bottom: 10px; border-radius: 5px; cursor: pointer; border: 1px solid #eee; -webkit-tap-highlight-color: transparent; }
        summary { font-weight: 700; font-size: 1.1rem; outline: none; display: flex; align-items: center; }
        summary::-webkit-details-marker { display: none; }
        details[open] summary { margin-bottom: 10px; border-bottom: 1px solid #ddd; padding-bottom: 10px; }

        /* --- FOOTER --- */
        footer { background-color: #111; color: #fff; text-align: center; padding: 40px; }
        footer p { font-size: 0.9rem; color: #888; }

        /* --- MOBILE --- */
        @media (max-width: 768px) {
            .banner h1 { font-size: 2rem; }
            .action-bar .btn { width: 100%; text-align: center; }
            .menu-toggle { display: block; }
            nav ul {
                position: fixed; top: 0; right: -100%; height: 100vh; width: 80%; max-width: 300px;
                background-color: #fff; flex-direction: column; justify-content: center; gap: 20px;
                box-shadow: -5px 0 15px rgba(0,0,0,0.1); transition: right 0.3s ease; padding: 40px;
            }
            nav ul.active { right: 0; }
            .dropdown-menu { position: relative; box-shadow: none; display: flex; flex-direction: column; background-color: transparent; padding-left: 15px; top: 0; min-width: auto; display: none; }
            .dropdown.active .dropdown-menu { display: flex; }
        }
    </style>
</head>
<body>
    <header>
        <a href="index.html" class="logo-link">
            <img src="assets/runstw-logo.jpg" alt="RUN STW Logo" class="logo-img">
        </a>
        <div class="menu-toggle" id="mobile-menu-btn">☰</div>
        <nav>
            <ul id="nav-menu">
                <li><a href="index.html">Home</a></li>
                <li class="dropdown" id="race-dropdown">
                    <a href="index.html#races" id="race-link">Our Races &#9662;</a>
                    <ul class="dropdown-menu" id="dropdown-menu"></ul>
                </li>
                <li><a href="weekly-runs.html">Weekly Runs</a></li>
                <li><a href="https://www.bonfire.com/stillwater-trail-and-road-runners/" target="_blank">Merch</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>
    </header>

    <section class="banner" id="banner">
        <h1 id="banner-title">Event Name</h1>
    </section>

    <section class="action-bar" id="action-bar">
        <a href="#" id="register-btn" class="btn" target="_blank">Register Now</a>
    </section>

    <section class="event-info">
        <h2>Event Info</h2>
        <div class="event-info-body" id="event-info-body"></div>
    </section>

    <section class="details-section">
        <h2>Race Details</h2>
        <div id="accordion-container"></div>
    </section>

    <footer>
        <img src="assets/runstw-logo.jpg" alt="RUN STW Logo" style="height: 40px; margin-bottom: 10px; border-radius: 50%;">
        <div class="social-links" style="margin: 15px 0; display: flex; justify-content: center; gap: 20px;">
            <a href="https://www.facebook.com/groups/stillwatertrailandroadrunners" target="_blank" style="color: #fff; font-weight: 700; text-transform: uppercase; font-size: 0.9rem; letter-spacing: 1px;">Facebook</a>
            <a href="https://www.instagram.com/stwtrailandroadrunners/" target="_blank" style="color: #fff; font-weight: 700; text-transform: uppercase; font-size: 0.9rem; letter-spacing: 1px;">Instagram</a>
            <a href="mailto:info@runstw.com" style="color: #fff; font-weight: 700; text-transform: uppercase; font-size: 0.9rem; letter-spacing: 1px;">Email</a>
        </div>
        <p>Stillwater Trail and Road Runners &bull; <a href="mailto:info@runstw.com" style="color:#888;">info@runstw.com</a></p>
        <p>&copy; 2026 runstw.com. All rights reserved.</p>
    </footer>

    <script>
        const menuBtn = document.getElementById('mobile-menu-btn');
        const navMenu = document.getElementById('nav-menu');
        const raceLink = document.getElementById('race-link');
        const raceDropdown = document.getElementById('race-dropdown');

        menuBtn.addEventListener('click', () => {
            navMenu.classList.toggle('active');
            menuBtn.innerHTML = navMenu.classList.contains('active') ? '✕' : '☰';
        });

        raceLink.addEventListener('click', (e) => {
            if (window.innerWidth <= 768) {
                e.preventDefault();
                raceDropdown.classList.toggle('active');
            }
        });

        // Close the mobile menu after tapping any real link so it
        // doesn't stay covering the page you just navigated to.
        navMenu.addEventListener('click', (e) => {
            const link = e.target.closest('a');
            if (link && link.id !== 'race-link' && navMenu.classList.contains('active')) {
                navMenu.classList.remove('active');
                menuBtn.innerHTML = '☰';
            }
        });
    </script>

    <script>
        // --- POPULATE NAV DROPDOWN FROM THE EVENTS REGISTRY ---
        fetch('data/events.json')
            .then(res => res.json())
            .then(data => {
                document.getElementById('dropdown-menu').innerHTML = data.events.map(e => `
                    <li><a href="${e.slug}.html">${e.navLabel}</a></li>
                `).join('');
            })
            .catch(err => console.error('Failed to load nav events:', err));

        // --- RENDER THIS PAGE'S CONTENT ---
        // The slug is derived from this file's own name, so this template
        // works unmodified for every generated event page.
        const slug = location.pathname.split('/').pop().replace('.html', '');

        fetch(`data/events/${slug}.json`)
            .then(res => res.json())
            .then(data => {
                document.getElementById('banner').style.backgroundImage =
                    `linear-gradient(rgba(0,0,0,0.35), rgba(0,0,0,0.35)), url('${data.bannerImage}')`;
                document.getElementById('banner-title').textContent = data.eventTitle;
                document.title = data.eventTitle + ' | STRR';

                document.getElementById('action-bar').style.backgroundColor = data.actionBarColor;
                const registerBtn = document.getElementById('register-btn');
                registerBtn.textContent = data.registerButtonText;
                registerBtn.style.color = data.actionBarColor;
                if (data.registerLink && data.registerLink !== '#') {
                    registerBtn.href = data.registerLink;
                } else {
                    registerBtn.removeAttribute('href');
                    registerBtn.style.cursor = 'default';
                }

                document.getElementById('event-info-body').innerHTML = data.eventInfo;

                const accordions = data.accordions || [];
                if (accordions.length) {
                    document.getElementById('accordion-container').innerHTML = accordions.map(acc => `
                        <details>
                            <summary>▸ ${acc.title}</summary>
                            <div style="padding-top: 10px; line-height: 1.6;">${acc.content}</div>
                        </details>
                    `).join('');
                } else {
                    document.querySelector('.details-section').style.display = 'none';
                }
            })
            .catch(err => console.error('Failed to load event content:', err));
    </script>
</body>
</html>

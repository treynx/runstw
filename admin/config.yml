backend:
  name: github
  repo: treynx/runstw
  branch: main
  base_url: https://runstw.vercel.app
  auth_endpoint: api/auth

media_folder: "assets"
public_folder: "/assets"

collections:
  - name: "homepage"
    label: "Homepage"
    files:
      - file: "data/homepage.json"
        label: "Weekly Schedule"
        name: "homepage"
        fields:
          - label: "Weekly Schedule"
            name: "schedule"
            widget: "list"
            summary: "{{day}} - {{event}}"
            fields:
              - { label: "Day", name: "day", widget: "string" }
              - { label: "Run Name", name: "event", widget: "string" }
              - { label: "Location / Time", name: "location", widget: "string" }

  - name: "events"
    label: "Events"
    files:
      - file: "data/events.json"
        label: "All Events"
        name: "events"
        fields:
          - label: "Events"
            name: "events"
            widget: "list"
            summary: "{{eventTitle}}"
            fields:
              - label: "URL Slug"
                name: "slug"
                widget: "string"
                hint: "Lowercase, no spaces, e.g. fall-classic. This becomes the page filename: fall-classic.html. Changing this after publishing creates a NEW page and leaves the old one behind."
              - { label: "Event Title", name: "eventTitle", widget: "string" }
              - { label: "Nav Menu Label", name: "navLabel", widget: "string" }
              - { label: "Show on Homepage?", name: "showOnHomepage", widget: "boolean", default: true }
              - { label: "Homepage Card Subtitle", name: "homepageSubtitle", widget: "string" }
              - { label: "Top Banner Photo", name: "bannerImage", widget: "image" }
              - { label: "Action Bar Color", name: "actionBarColor", widget: "color" }
              - { label: "Register Button Link", name: "registerLink", widget: "string" }
              - { label: "Register Button Text", name: "registerButtonText", widget: "string" }
              - { label: "Event Info (HTML allowed)", name: "eventInfo", widget: "text" }
              - label: "Race Detail Sections (accordions)"
                name: "accordions"
                widget: "list"
                summary: "{{title}}"
                fields:
                  - { label: "Section Title", name: "title", widget: "string" }
                  - { label: "Content (HTML allowed)", name: "content", widget: "text" }

backend:
  name: github
  repo: treynx/runstw
  branch: main
  base_url: https://runstw.vercel.app
  auth_endpoint: api/auth

site_url: https://runstw.com
display_url: https://runstw.com
logo:
  src: "/assets/runstw-logo.jpg"
  show_in_header: true

media_folder: "assets"
public_folder: "/assets"

collections:
  - name: "homepage"
    label: "Homepage"
    files:
      - file: "data/homepage.json"
        label: "Homepage & Weekly Runs"
        name: "homepage"
        fields:
          - label: "Homepage Hero"
            name: "hero"
            widget: "object"
            collapsed: false
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Tagline", name: "tagline", widget: "string" }
              - { label: "Background Photo", name: "image", widget: "image" }
          - label: "Weekly Runs Intro"
            name: "weeklyIntro"
            widget: "text"
            hint: "Welcome paragraph at the top of the Weekly Runs page."
          - label: "Weekly Schedule"
            name: "schedule"
            widget: "list"
            summary: "{{day}} - {{event}}"
            fields:
              - { label: "Day", name: "day", widget: "string" }
              - { label: "Run Name", name: "event", widget: "string" }
              - { label: "Time", name: "time", widget: "string", hint: "e.g. 6:00 PM. Update this when the seasonal schedule changes." }
              - { label: "Location", name: "location", widget: "string" }
              - { label: "Google Maps Link", name: "mapLink", widget: "string", required: false, hint: "Optional. Makes the location tap-to-open in Maps." }
              - { label: "Photo", name: "image", widget: "image", required: false, hint: "Optional. Shown at the top of this run's card on the Weekly Runs page." }
              - { label: "Description", name: "description", widget: "text", required: false, hint: "A couple of sentences shown on the Weekly Runs page." }

  - name: "events"
    label: "Events"
    files:
      - file: "data/events.json"
        label: "All Events"
        name: "events"
        fields:
          - label: "Events"
            name: "events"
            widget: "list"
            summary: "{{eventTitle}}"
            fields:
              - label: "URL Slug"
                name: "slug"
                widget: "string"
                hint: "Lowercase, no spaces, e.g. fall-classic. This becomes the page filename: fall-classic.html. Changing this after publishing creates a NEW page and leaves the old one behind."
              - { label: "Event Title", name: "eventTitle", widget: "string" }
              - { label: "Event Date", name: "eventDate", widget: "datetime", required: false, hint: "Optional. When set, the race becomes eligible for Google's event listings in search results." }
              - { label: "Venue", name: "venue", widget: "string", required: false, hint: "Optional, for Google. e.g. Lake McMurtry East Recreation Area" }
              - { label: "Nav Menu Label", name: "navLabel", widget: "string" }
              - { label: "Show on Homepage?", name: "showOnHomepage", widget: "boolean", default: true }
              - { label: "Homepage Card Subtitle", name: "homepageSubtitle", widget: "string" }
              - { label: "Top Banner Photo", name: "bannerImage", widget: "image" }
              - { label: "Event Logo (over banner)", name: "eventLogo", widget: "image", required: false, hint: "Optional. Shown centered over the banner photo in place of the text title. Transparent PNG works best." }
              - { label: "Action Bar Color", name: "actionBarColor", widget: "color" }
              - { label: "Register Button Link", name: "registerLink", widget: "string" }
              - { label: "Register Button Text", name: "registerButtonText", widget: "string" }
              - { label: "Volunteer Link", name: "volunteerLink", widget: "string", required: false, hint: "Optional. When filled in, a Volunteer button appears next to Register (e.g. your RunSignUp volunteer page)." }
              - { label: "Volunteer Button Text", name: "volunteerButtonText", widget: "string", required: false, default: "Volunteer" }
              - { label: "Event Info (HTML allowed)", name: "eventInfo", widget: "text" }
              - label: "Race Detail Sections (accordions)"
                name: "accordions"
                widget: "list"
                summary: "{{title}}"
                fields:
                  - { label: "Section Title", name: "title", widget: "string" }
                  - { label: "Content (HTML allowed)", name: "content", widget: "text" }

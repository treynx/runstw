<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>STRR Content Admin</title>
  <link rel="icon" type="image/jpeg" href="../assets/runstw-logo.jpg">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      font-family: 'Montserrat', sans-serif;
      background-color: #fcfcfc;
    }
    /* Shown briefly while decap-cms.js downloads, then covered by the editor UI */
    #cms-loading {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      background-color: #111;
      color: #fff;
    }
    #cms-loading img { height: 60px; width: auto; border-radius: 50%; }
    #cms-loading span { font-weight: 700; text-transform: uppercase; letter-spacing: 1px; font-size: 0.9rem; color: #e65100; }
  </style>
</head>
<body>
  <div id="cms-loading">
    <img src="../assets/runstw-logo.jpg" alt="RUN STW Logo">
    <span>Loading STRR Admin&hellip;</span>
  </div>

  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  <script>
    // --- BRAND THEME FOR THE LIVE PREVIEW PANE ---
    // Matches the fonts/colors used on runstw.com so editors see content
    // close to how it will actually render on the site.
    CMS.registerPreviewStyle(`
      @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap');
      body { font-family: 'Montserrat', sans-serif; color: #333; line-height: 1.6; }
      h1, h2, h3, h4 { font-weight: 900; text-transform: uppercase; letter-spacing: 1px; }
      a { color: #e65100; }
      table { border-collapse: collapse; width: 100%; }
      td, th { padding: 10px; text-align: left; }
      th { background: #f5f5f5; border-bottom: 2px solid #ddd; }
      td { border-bottom: 1px solid #eee; }
    `, { raw: true });

    var brand = {
      orange: '#e65100',
      blue: '#005b96',
      dark: '#111',
      text: '#333',
      muted: '#666',
      border: '#ddd',
      font: "'Montserrat', sans-serif"
    };

    function resolveImage(props, value) {
      if (!value) return '';
      return /^https?:\/\//.test(value) ? value : props.getAsset(value);
    }

    // --- HOMEPAGE PREVIEW: mirrors the "Weekly Schedule" section ---
    var HomepagePreview = createClass({
      render: function () {
        var data = this.props.entry.get('data').toJS();
        var schedule = data.schedule || [];
        return h('div', { style: { fontFamily: brand.font, padding: '20px', maxWidth: '800px', margin: '0 auto' } },
          h('h2', { style: { textAlign: 'center', fontWeight: 900, textTransform: 'uppercase', margin: '20px 0' } }, 'Weekly Schedule'),
          h('div', {},
            schedule.map(function (row, i) {
              return h('div', {
                key: i,
                style: { display: 'flex', justifyContent: 'space-between', padding: '15px 0', borderBottom: '1px solid ' + brand.border }
              },
                h('div', { style: { fontWeight: 700, color: brand.orange, width: '25%' } }, '• ' + (row.day || '')),
                h('div', { style: { fontWeight: 900, textTransform: 'uppercase', width: '40%' } }, row.event || ''),
                h('div', { style: { color: brand.muted, width: '35%', textAlign: 'right' } }, row.location || '')
              );
            })
          )
        );
      }
    });
    CMS.registerPreviewTemplate('homepage', HomepagePreview);

    // --- EVENTS PREVIEW: mirrors the race cards + event detail page ---
    var EventsPreview = createClass({
      render: function () {
        var self = this.props;
        var data = self.entry.get('data').toJS();
        var events = data.events || [];
        return h('div', { style: { fontFamily: brand.font, color: brand.text } },
          h('h2', { style: { textAlign: 'center', fontWeight: 900, textTransform: 'uppercase', margin: '20px 0' } }, 'Our Events'),
          h('div', { style: { display: 'flex', gap: '16px', flexWrap: 'wrap', padding: '0 20px' } },
            events.filter(function (e) { return e.showOnHomepage; }).map(function (evt, i) {
              var bg = resolveImage(self, evt.bannerImage);
              return h('div', {
                key: i,
                style: {
                  position: 'relative', flex: '1 1 300px', height: '260px',
                  backgroundImage: 'linear-gradient(to top, rgba(0,0,0,0.8), rgba(0,0,0,0.1)), url(' + bg + ')',
                  backgroundSize: 'cover', backgroundPosition: 'center',
                  display: 'flex', alignItems: 'flex-end', padding: '20px'
                }
              },
                h('div', { style: { color: '#fff' } },
                  h('div', { style: { fontWeight: 900, fontSize: '1.4rem', textTransform: 'uppercase' } }, evt.eventTitle),
                  h('div', { style: { fontWeight: 700 } }, evt.homepageSubtitle)
                )
              );
            })
          ),
          events.map(function (evt, i) {
            var accentColor = evt.actionBarColor || brand.orange;
            return h('div', { key: 'detail-' + i, style: { margin: '40px 20px', paddingTop: '20px', borderTop: '3px solid ' + accentColor } },
              h('h2', { style: { color: accentColor, textTransform: 'uppercase' } }, evt.eventTitle),
              evt.registerLink ? h('a', {
                href: evt.registerLink,
                style: {
                  display: 'inline-block', margin: '10px 0', padding: '12px 24px',
                  backgroundColor: accentColor, color: '#fff', fontWeight: 700,
                  textTransform: 'uppercase', textDecoration: 'none', borderRadius: '4px'
                }
              }, evt.registerButtonText || 'Register Now') : null,
              h('div', { dangerouslySetInnerHTML: { __html: evt.eventInfo || '' } }),
              (evt.accordions || []).map(function (acc, j) {
                return h('div', { key: j, style: { marginTop: '20px', borderBottom: '1px solid ' + brand.border, paddingBottom: '15px' } },
                  h('h4', { style: { textTransform: 'uppercase', marginBottom: '10px' } }, acc.title),
                  h('div', { dangerouslySetInnerHTML: { __html: acc.content || '' } })
                );
              })
            );
          })
        );
      }
    });
    CMS.registerPreviewTemplate('events', EventsPreview);
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Stillwater Trail and Road Runners | STRR</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        /* --- GLOBAL STYLES --- */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Montserrat', sans-serif; color: #333; background-color: #fcfcfc; line-height: 1.6; overflow-x: hidden; }
        a { text-decoration: none; color: inherit; }

        /* --- HEADER NAVIGATION --- */
        header { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; background-color: #fff; position: fixed; width: 100%; top: 0; z-index: 1000; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .logo-img { height: 50px; width: auto; display: block; }
        .logo-link { display: flex; align-items: center; z-index: 1001; position: relative; }
        
        /* The Hamburger Icon (Hidden on Desktop) */
        .menu-toggle { display: none; font-size: 1.8rem; cursor: pointer; z-index: 1001; position: relative; color: #333; }

        nav ul { list-style: none; display: flex; gap: 30px; align-items: center; }
        nav ul li a { font-weight: 700; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px; transition: color 0.3s; padding: 10px 0; display: block; }
        nav ul li a:hover { color: #e65100; }

        /* --- DROPDOWN MENU STYLES --- */
        .dropdown { position: relative; }
        .dropdown-menu { display: none; position: absolute; top: 100%; left: 0; background-color: #fff; min-width: 250px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); padding: 10px 0; border-radius: 0 0 5px 5px; z-index: 1000; }
        .dropdown:hover .dropdown-menu { display: flex; flex-direction: column; gap: 0; }
        .dropdown-menu li { padding: 0; }
        .dropdown-menu li a { display: block; padding: 12px 20px; font-size: 0.85rem; font-weight: 700; text-transform: none; }
        .dropdown-menu li a:hover { background-color: #f5f5f5; }

        /* --- HERO SECTION --- */
        .hero { height: 100vh; background-image: linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.4)), url('assets/group.jpg'); background-size: cover; background-position: center; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; color: #fff; padding-top: 80px; }
        .hero h1 { font-size: 4rem; font-weight: 900; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 20px; padding: 0 20px; }
        .hero p { font-size: 1.2rem; font-weight: 400; margin-bottom: 30px; }

        /* --- OUR RACES GRID --- */
        .section-title { text-align: center; font-size: 2.5rem; font-weight: 900; text-transform: uppercase; margin: 80px 0 40px 0; letter-spacing: 1.5px; }
        .race-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; padding: 0 40px; max-width: 1400px; margin: 0 auto; }
        .race-card { position: relative; height: 500px; background-size: cover; background-position: center; display: flex; align-items: flex-end; padding: 40px; transition: transform 0.3s ease; }
        .race-card:hover { transform: scale(1.02); }
        .race-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: linear-gradient(to top, rgba(0,0,0,0.8), rgba(0,0,0,0.1)); }
        .race-content { position: relative; z-index: 10; color: #fff; }
        .race-content h2 { font-size: 2.5rem; font-weight: 900; text-transform: uppercase; margin-bottom: 10px; }
        .race-content p { font-size: 1.1rem; font-weight: 700; }

        /* --- COMMUNITY CALENDAR --- */
        .calendar-container { max-width: 1000px; margin: 0 auto; padding: 0 40px 80px 40px; }
        .calendar-row { display: flex; justify-content: space-between; align-items: center; padding: 25px 0; border-bottom: 1px solid #ddd; }
        .calendar-row:first-child { border-top: 1px solid #ddd; }
        .cal-date { font-weight: 700; font-size: 1.2rem; width: 18%; color: #e65100; }
        .cal-event { font-weight: 900; font-size: 1.2rem; text-transform: uppercase; width: 42%; }
        .cal-location { font-weight: 400; width: 40%; text-align: right; color: #666; }

        /* --- FOOTER --- */
        footer { background-color: #111; color: #fff; text-align: center; padding: 40px; }
        .social-links { margin: 15px 0; display: flex; justify-content: center; gap: 20px; }
        .social-links a { color: #fff; font-weight: 700; text-transform: uppercase; font-size: 0.9rem; letter-spacing: 1px; transition: color 0.3s; }
        .social-links a:hover { color: #e65100; }
        footer p { font-size: 0.9rem; color: #888; }

        /* --- TRUE MOBILE OPTIMIZATION --- */
        @media (max-width: 768px) {
            .hero h1 { font-size: 2.2rem; }
            .race-grid { grid-template-columns: 1fr; padding: 0 20px; }
            .calendar-row { flex-direction: column; align-items: flex-start; gap: 10px; }
            .cal-date, .cal-event, .cal-location { width: 100%; text-align: left; }
            
            /* Hamburger Menu Activation */
            .menu-toggle { display: block; }
            nav ul { 
                position: fixed; top: 0; right: -100%; height: 100vh; width: 80%; max-width: 300px; 
                background-color: #fff; flex-direction: column; justify-content: center; gap: 20px; 
                box-shadow: -5px 0 15px rgba(0,0,0,0.1); transition: right 0.3s ease; padding: 40px; 
            }
            nav ul.active { right: 0; }
            
            /* Mobile Dropdown Fix */
            .dropdown-menu { position: relative; box-shadow: none; display: flex; flex-direction: column; background-color: transparent; padding-left: 15px; top: 0; min-width: auto; display: none; }
            .dropdown.active .dropdown-menu { display: flex; }
        }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="logo-link">
            <img src="assets/runstw-logo.jpg" alt="RUN STW Logo" class="logo-img">
        </a>
        
        <div class="menu-toggle" id="mobile-menu-btn">☰</div>

        <nav>
            <ul id="nav-menu">
                <li><a href="index.html">Home</a></li>
                <li class="dropdown" id="race-dropdown">
                    <a href="#races" id="race-link">Our Races &#9662;</a>
                    <ul class="dropdown-menu">
                        <li><a href="orange-dirt.html">Orange Dirt Trail Series</a></li>
                        <li><a href="mcmurtry.html">Lake McMurtry Trail Run</a></li>
                    </ul>
                </li>
                <li><a href="#weekly-runs">Weekly Runs</a></li>
                <li><a href="#">Contact</a></li>
            </ul>
        </nav>
    </header>

    <section class="hero">
        <h1>Stillwater Trail and Road Runners</h1>
        <p></p>
    </section>

    <section id="races">
        <h2 class="section-title">Our Events</h2>
        <div class="race-grid" id="race-grid">
            <!-- Populated from data/homepage.json -->
        </div>
    </section>

    <section id="weekly-runs">
        <h2 class="section-title">Weekly Schedule</h2>
        <div class="calendar-container" id="calendar-container">
            <!-- Populated from data/homepage.json -->
        </div>
    </section>

    <footer>
        <img src="assets/runstw-logo.jpg" alt="RUN STW Logo" style="height: 40px; margin-bottom: 10px; border-radius: 50%;">
        
        <div class="social-links">
            <a href="https://www.facebook.com/groups/stillwatertrailandroadrunners" target="_blank">Facebook</a>
            <a href="https://www.instagram.com/stwtrailandroadrunners/" target="_blank">Instagram</a>
        </div>

        <p>Stillwater Trail and Road Runners</p>
        <p>&copy; 2026 runstw.com. All rights reserved.</p>
    </footer>

    <script>
        const menuBtn = document.getElementById('mobile-menu-btn');
        const navMenu = document.getElementById('nav-menu');
        const raceLink = document.getElementById('race-link');
        const raceDropdown = document.getElementById('race-dropdown');

        menuBtn.addEventListener('click', () => {
            navMenu.classList.toggle('active');
            if(navMenu.classList.contains('active')){
                menuBtn.innerHTML = '✕';
            } else {
                menuBtn.innerHTML = '☰';
            }
        });

        raceLink.addEventListener('click', (e) => {
            if (window.innerWidth <= 768) {
                e.preventDefault(); 
                raceDropdown.classList.toggle('active');
            }
        });
    </script>

    <script>
        // --- RENDER CONTENT FROM data/homepage.json ---
        fetch('data/homepage.json')
            .then(res => res.json())
            .then(data => {
                const raceGrid = document.getElementById('race-grid');
                raceGrid.innerHTML = data.events.map(ev => `
                    <a href="${ev.link}" class="race-card" style="background-image: url('${ev.image}');">
                        <div class="race-content">
                            <h2>${ev.title}</h2>
                            <p>${ev.subtitle}</p>
                        </div>
                    </a>
                `).join('');

                const calendar = document.getElementById('calendar-container');
                calendar.innerHTML = data.schedule.map(row => `
                    <div class="calendar-row">
                        <div class="cal-date">&bull; ${row.day}</div>
                        <div class="cal-event">${row.event}</div>
                        <div class="cal-location">${row.location}</div>
                    </div>
                `).join('');
            })
            .catch(err => console.error('Failed to load homepage content:', err));
    </script>
</body>
</html>
